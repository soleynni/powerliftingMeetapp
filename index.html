<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powerlifting Meet App</title>

<style>
body { font-family: Arial; margin: 10px; }
button { padding:6px 8px; margin:2px; }
input { width:60px; text-align:center; }

.lifterRow{
border-bottom:1px solid #ccc;
padding:6px 0;
display:flex;
justify-content:space-between;
font-size:14px;
}

.section{
border:1px solid #ddd;
margin-top:10px;
padding:5px;
}

.good{background:#4CAF50;color:white;}
.miss{background:#d9534f;color:white;}
.clear{background:#999;color:white;}
.adjust{background:#eee;}

.small{font-size:12px;color:#555;}
</style>
</head>

<body>

<div id="dashboard">

<h2>Team Dashboard</h2>

<div id="lifters"></div>

<br>

<button onclick="addLifter()">Add Lifter</button>
<button onclick="document.getElementById('csvFile').click()">Import Lifters</button>
<button onclick="finishMeet()">Finish Meet</button>
<button onclick="reopenMeet()">Reopen Meet</button>
<button onclick="exportCSV()">Export Results</button>
<button onclick="startNewMeet()">Start New Meet</button>

<input type="file" id="csvFile" accept=".csv" style="display:none" onchange="importCSV(event)">

</div>


<div id="lifterView" style="display:none">

<button onclick="goBack()">Back</button>

<h2 id="lifterName"></h2>

<button onclick="editLifter()">Edit Lifter</button>
<button onclick="deleteLifter()">Delete Lifter</button>

<div id="lifts"></div>

<h3>Summary</h3>
<div id="summary"></div>

</div>


<script>

let meetFinished=false;

let lifters = JSON.parse(localStorage.getItem("meetData") || "[]");

let currentIndex=null;


function save(){
localStorage.setItem("meetData",JSON.stringify(lifters));
}


function makeLift(){
return[
{weight:0,result:null},
{weight:0,result:null},
{weight:0,result:null}
];
}


function addLifter(){

let name=prompt("Lifter Name");
if(!name)return;

let wc=prompt("Weight Class");

lifters.push({
name,
wc,
lifts:{
squat:makeLift(),
bench:makeLift(),
deadlift:makeLift()
}
});

save();
renderDashboard();

}


function editLifter(){

let l=lifters[currentIndex];

let newName=prompt("Edit Name",l.name);
if(!newName)return;

let newWC=prompt("Edit Weight Class",l.wc);

l.name=newName;
l.wc=newWC;

save();
renderLifts();

}


function deleteLifter(){

if(!confirm("Delete this lifter?"))return;

lifters.splice(currentIndex,1);

save();

goBack();

}


function renderDashboard(){

let container=document.getElementById("lifters");

container.innerHTML="";

lifters.forEach((l,i)=>{

let totals=calculateTotals(l);

let attempt=currentAttempt(l);

let row="";

if(attempt==="BOMB"){

row=`${l.name}   BOMB OUT`;

}else{

row=`${l.name}   ${attempt.label} ${attempt.weight}`;

if(attempt.open)row+=" ?";

row+=`   ${totals.running} | ${totals.predicted}`;

}

container.innerHTML+=`
<div class="lifterRow" onclick="openLifter(${i})">
${row}
</div>
`;

});

}


function currentAttempt(l){

let order=[
["squat",0],["squat",1],["squat",2],
["bench",0],["bench",1],["bench",2],
["deadlift",0],["deadlift",1],["deadlift",2]
];

for(let [lift,i] of order){

let a=l.lifts[lift][i];

if(a.result===null){

return{
label:liftShort(lift)+(i+1),
weight:a.weight,
open:true
};

}

}

return{label:"DONE",weight:"",open:false};

}


function liftShort(l){

if(l==="squat")return"SQ";
if(l==="bench")return"BN";
return"DL";

}


function openLifter(i){

currentIndex=i;

document.getElementById("dashboard").style.display="none";

document.getElementById("lifterView").style.display="block";

let l=lifters[i];

document.getElementById("lifterName").innerText=l.name+" ("+l.wc+")";

renderLifts();

}


function goBack(){

currentIndex=null;

document.getElementById("dashboard").style.display="block";

document.getElementById("lifterView").style.display="none";

renderDashboard();

}


function renderLifts(){

let l=lifters[currentIndex];

let container=document.getElementById("lifts");

container.innerHTML="";

["squat","bench","deadlift"].forEach(lift=>{

container.innerHTML+=`<div class="section"><h3>${lift.toUpperCase()}</h3>`;

l.lifts[lift].forEach((a,idx)=>{

container.innerHTML+=`

<div>

Attempt ${idx+1}

<button class="adjust" onclick="adjustWeight('${lift}',${idx},-5)">-5</button>

<input type="number" value="${a.weight}" onchange="manualWeight('${lift}',${idx},this.value)">

<button class="adjust" onclick="adjustWeight('${lift}',${idx},5)">+5</button>

<button class="${a.result==='good'?'good':''}" onclick="setResult('${lift}',${idx},'good')">GOOD</button>

<button class="${a.result==='miss'?'miss':''}" onclick="setResult('${lift}',${idx},'miss')">MISS</button>

<button class="clear" onclick="clearResult('${lift}',${idx})">CLEAR</button>

</div>

`;

});

container.innerHTML+=`</div>`;

});

renderSummary();

}


function adjustWeight(lift,idx,change){

let attempts=lifters[currentIndex].lifts[lift];

let newVal=(attempts[idx].weight||0)+change;

if(newVal<0)newVal=0;

if(idx>0 && newVal<attempts[idx-1].weight){

alert("Cannot decrease below previous attempt");

return;

}

attempts[idx].weight=newVal;

save();

renderLifts();

}


function manualWeight(lift,idx,val){

val=parseInt(val)||0;

if(val%5!==0){

alert("Must be multiple of 5");

renderLifts();

return;

}

let attempts=lifters[currentIndex].lifts[lift];

if(idx>0 && val<attempts[idx-1].weight){

alert("Cannot decrease below previous attempt");

renderLifts();

return;

}

attempts[idx].weight=val;

save();

renderLifts();

}


function setResult(lift,idx,res){

lifters[currentIndex].lifts[lift][idx].result=res;

save();

renderLifts();

}


function clearResult(lift,idx){

lifters[currentIndex].lifts[lift][idx].result=null;

save();

renderLifts();

}


function bestLift(l,lift){

let best=0;

l.lifts[lift].forEach(a=>{

if(a.result==="good" && a.weight>best)best=a.weight;

});

return best;

}


function predictedLift(l,lift){

let attempts=l.lifts[lift];

let unresolved=attempts.some(a=>a.result===null);

if(unresolved){

let max=0;

attempts.forEach(a=>{if(a.weight>max)max=a.weight});

return max;

}else{

return bestLift(l,lift);

}

}


function calculateTotals(l){

let running=
bestLift(l,"squat")+
bestLift(l,"bench")+
bestLift(l,"deadlift");

let predicted=
predictedLift(l,"squat")+
predictedLift(l,"bench")+
predictedLift(l,"deadlift");

return{running,predicted};

}


function renderSummary(){

let l=lifters[currentIndex];

let totals=calculateTotals(l);

document.getElementById("summary").innerHTML=`

Best Squat: ${bestLift(l,"squat")}<br>
Best Bench: ${bestLift(l,"bench")}<br>
Best Deadlift: ${bestLift(l,"deadlift")}<br><br>

<strong>Running Total: ${totals.running}</strong><br>
<strong>Predicted Total: ${totals.predicted}</strong>

`;

}


function finishMeet(){

meetFinished=true;

alert("Meet finished");

}


function reopenMeet(){

meetFinished=false;

alert("Meet reopened");

}


function startNewMeet(){

if(!confirm("Start a new meet?\n\nThis will erase all lifters. Make sure you exported results first.")){
return;
}

lifters = [];
meetFinished = false;

save();
renderDashboard();

}

function exportCSV(){

let rows=[];

rows.push("Name,WeightClass,SQ1,SQ1 Result,SQ2,SQ2 Result,SQ3,SQ3 Result,BN1,BN1 Result,BN2,BN2 Result,BN3,BN3 Result,DL1,DL1 Result,DL2,DL2 Result,DL3,DL3 Result");

lifters.forEach(l=>{

let r=[l.name,l.wc];

["squat","bench","deadlift"].forEach(lift=>{

l.lifts[lift].forEach(a=>{

r.push(a.weight);

r.push(a.result||"");

});

});

rows.push(r.join(","));

});

let csv=rows.join("\n");

let blob=new Blob([csv],{type:"text/csv"});

let url=URL.createObjectURL(blob);

let a=document.createElement("a");

a.href=url;

a.download="meet_results.csv";

a.click();

}

function importCSV(event){

const file = event.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

const text = e.target.result;
const lines = text.trim().split("\n");

for(let i=1;i<lines.length;i++){

let [name,wc,sq1,bn1,dl1] = lines[i].split(",");

sq1 = parseInt(sq1) || 0;
bn1 = parseInt(bn1) || 0;
dl1 = parseInt(dl1) || 0;

lifters.push({
name:name,
wc:wc,
lifts:{
squat:[
{weight:sq1,result:null},
{weight:0,result:null},
{weight:0,result:null}
],
bench:[
{weight:bn1,result:null},
{weight:0,result:null},
{weight:0,result:null}
],
deadlift:[
{weight:dl1,result:null},
{weight:0,result:null},
{weight:0,result:null}
]
}
});

}

save();
renderDashboard();

};

reader.readAsText(file);

}

renderDashboard();

</script>

</body>
</html>
